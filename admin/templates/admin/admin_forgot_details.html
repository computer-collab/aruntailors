<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hidden{
            display: none;
        }
    </style>
</head>
<body>
    <forms >
        {% csrf_token %}
        <div id="ForgotPassword" class="none">
            <input placeholder="Enter Email Address" name="EmailBox" type="email" required>
            <button id="GenerateOtp" type="button">GenerateOtp</button>"
            <input placeholder="Enter the OTP" name = "OTPBox" type="password">
            <button id="VerifyEmailAddress">Submit</button>

        </div>
        <div id="ChangePassword" class="hidden">
            <input placeholder="Enter Password" id="PasswordBox1">
            <input placeholder="re-nter Password" id="PasswordBox2">
            <button id="SubmitPassword">Submit</button>
        </div>
    </forms>
    <div id="MessageBox"></div>
    <script >
        
        const EmailBox = document.querySelector("[name=EmailBox]");
        const GenerateOtpButton = document.getElementById("GenerateOtp");
        const OtpBox = document.querySelector("[name=OTPBox]");
        const VerifyEmailAddressButton = document.querySelector("#VerifyEmailAddress");
        const MessageBox = document.getElementById("MessageBox");
        let request_type;
       window.onload = function x(){ 
        
        fetch("forgot_details",{
            method : "POST",
            headers : {
                "content-type" : "application/json",
                "X-CSRFToken" : document.querySelector("[name=csrfmiddlewaretoken]").value
            }, body : JSON.stringify({request_type : "fetch_status"})
        }).then(res => res.json()).then( server => {
            if (server.status == "ok" && server.request_type == "email_verified"){
                let x;
            } else alert(server.message)
        })

        GenerateOtpButton.addEventListener("click", button=>{
            button.preventDefault(); 
            const details_pack = {
                request_type : "generate_otp",
                email : EmailBox.value
            }
            fetch("forgot_details",{
                method : "POST",
                headers : {
                     "content-type" : "application/json",
                    "X-CSRFToken" : document.querySelector("[name=csrfmiddlewaretoken]").value
               }, body : JSON.stringify(details_pack)
            }).then(res=>res.json()).then(server=>{
                if (server.status == "ok"){
                    MessageBox.innerHTML = server.message
                }
            })
        })
    }
    </script>
</body>
</html>
