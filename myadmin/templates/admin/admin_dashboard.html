<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Admin</title>
    <style >
    
        body{
         margin-top: 50px; 
            
            
            
        }nav{
          display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 40px;
    background-color: rgba(2,2,2,0.7);
    align-items: center;
    gap : 10px;
    
}
        
        #ProfileSidePanelBackDiv{
            position: fixed;
            width: 100%;
            overflow: hidden;
            top: 0px;
            left: 0px
            transform: translateX(-100%);
            background-color: rgba(0,0,0,0);
            
            height: 100vh;
            overflow: hidden;
            transition: transform 0.3s ease;
            

        }
        #ProfileSidePanelBackDiv.hidden{
          transform: translateX( 0%);
          background-color: rgba(0,0,0,0.6);
          margin: 0px;
        }
        #ProfileSidePanel{
    position: absolute;
    top: 0;
    left: 0;
    margin-left: 0px;

    width: 75vw;
    max-width: 500px;
    height: 100vh;

    background-color: aquamarine;

    overflow-y: auto;
    overflow-x: hidden;

    transform: translateX(-100%);
    transition: transform 0.3s ease;
    will-change: transform;
}

#ProfileSidePanelBackDiv.hidden #ProfileSidePanel{
    transform: translateX(0);
}</style>
</head>
<body>
    {% load static %}
    <nav  >
      <button id="MenuButton">≡</button>
        <img id = "ProfileButton"  src="profiles/pics/{{username}}.jpg" style="height: 25px; width:  25px; border-radius: 50%;">
        <a>HOME</a>
        
    </nav>
    <div id="ProfileSidePanelBackDiv" >
    <div id="ProfileSidePanel" >

    </div></div>
    <div id="container">
        <button id="AddEmployeesButton">Add AddEmployeesButton</button>
    </div>
    <script>
      const MenuButton = document.getElementById('MenuButton');
        const ProfileSidePanel = document.getElementById("ProfileSidePanel");
        const ProfileSidePanelBackDiv = document.getElementById("ProfileSidePanelBackDiv");
        const ProfileButton = document.getElementById("ProfileButton");
        MenuButton.addEventListener("click",profileView=>{
            profileView.preventDefault();
            ProfileSidePanelBackDiv.classList.toggle("hidden");

        })
        ProfileSidePanelBackDiv.addEventListener('click',abc=>{
          abc.preventDefault();
        
          ProfileSidePanelBackDiv.classList.toggle('hidden')
        })

    </script>
</body>
</html>
